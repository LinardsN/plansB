# Netlify build + deploy config. Lives in the repo so the dashboard never
# needs manual settings; Netlify reads this on every build.

[build]
  command = "npm run build"
  publish = "dist"

[build.environment]
  NODE_VERSION = "22"

# Local dev with `netlify dev` (optional — runs Vite under Netlify's proxy
# so _headers and _redirects apply locally).
[dev]
  command = "npm run dev"
  port = 8888
  targetPort = 5173
  publish = "dist"
  autoLaunch = false
